name: Update LN Releases

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 6:00 UTC
  workflow_dispatch:       # Allow manual runs

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone LNRelease repo
        run: |
          git clone https://github.com/LNRelease/lnrelease.github.io lnrelease-src

      - name: Apply JSON output patch
        run: |
          patch -d lnrelease-src << 'EOF'
          *** a/write.py
          --- b/write.py
          @@
           from utils import FORMATS, Book, Format, Release, Table
           OUT = Path('README.md')
          +import json
          +
          +def write_json(releases, output: Path):
          +    data = []
          +    for r in releases:
          +        data.append({
          +            "title": r.name,
          +            "volume": r.volume,
          +            "date": r.date.isoformat(),
          +            "publisher": r.publisher,
          +            "format": str(r.format),
          +            "link": r.link,
          +            "isbn": r.isbn,
          +        })
          +    with open(output, "w", encoding="utf-8") as f:
          +        json.dump(data, f, ensure_ascii=False, indent=2)
          @@ def main() -> None:
           write_page(filtered, OUT, f'# Licensed Light Novel Releases', True)
          +write_json(filtered, Path("releases.json"))
          EOF

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install LNRelease dependencies
        run: |
          cd lnrelease-src
          pip install -r requirements.txt

      - name: Run LNRelease pipeline
        run: |
          cd lnrelease-src
          python lnrelease.py

      - name: Copy JSON into your repo
        run: |
          cp lnrelease-src/releases.json data/releases.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/releases.json
          git commit -m "Update releases.json" || echo "No changes to commit"
          git push
