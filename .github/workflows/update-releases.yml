name: Update LN Releases

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Clone LNRelease repo
        run: |
          git clone https://github.com/LNRelease/lnrelease.github.io lnrelease-src

      - name: Build scraper Docker image
        run: |
          docker build -t ln-scraper .

      - name: Run scraper inside container
        run: |
          docker run \
            -v ${{ github.workspace }}/data:/app/data \
            -v ${{ github.workspace }}/public:/app/public \
            -v ${{ github.workspace }}/debug:/app/debug \
            ln-scraper

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/releases.json public/covers debug
          git commit -m "Updated releases.json and covers" || echo "No changes to commit"
          git push


