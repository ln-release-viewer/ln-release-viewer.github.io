name: Update LN Releases

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Clone LNRelease repo
        run: |
          git clone https://github.com/LNRelease/lnrelease.github.io lnrelease-src

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parse README into JSON
        run: |
          python scripts/parse_readme.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/releases.json
          git commit -m "Update releases.json" || echo "No changes to commit"
          git push

